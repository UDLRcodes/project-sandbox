name: mutation

# Adversarial "test-the-tests" layer: mutmut mutates project_sandbox.py and checks the
# suite catches each change. Kept OFF the PR hot path — it's advisory and slower.
on:
  schedule:
    - cron: "0 4 * * 1" # weekly (Mondays 04:00 UTC)
  workflow_dispatch: {} # run on demand
  pull_request:
    types: [labeled] # or when a PR is labelled "mutation"

permissions: {}

jobs:
  mutmut:
    # only run on PRs that carry the "mutation" label; always run for schedule/dispatch
    if: github.event_name != 'pull_request' || github.event.label.name == 'mutation'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
      - run: uv venv --python 3.12
      - run: uv pip install -r requirements-dev.txt
      - name: Run mutation testing (advisory)
        run: |
          uv run mutmut run || true
          {
            echo '### Mutation testing results'
            echo '```'
            uv run mutmut results || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
